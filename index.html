<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadIntel Pro | Enterprise AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">L</div>
                <span>LeadIntel Pro</span>
            </div>
            <nav class="nav-links">
                <div class="nav-item active">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </div>
                <div class="nav-item">
                    <i data-lucide="users"></i>
                    All Leads
                </div>
                <div class="nav-item">
                    <i data-lucide="trending-up"></i>
                    Analytics
                </div>
                <div class="nav-item">
                    <i data-lucide="settings"></i>
                    Integrations
                </div>
            </nav>
            <div class="nav-item" style="margin-top: auto;">
                <i data-lucide="log-out"></i>
                Sign Out
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Intelligence Dashboard</h1>
                    <p style="color: var(--text-secondary); margin-top: 4px;">Real-time growth signals for ERP Experts</p>
                </div>

                <!-- Trigger Buttons -->
                <div class="header-actions" style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
                    <div style="display: flex; gap: 10px;">
                        <!-- Search News -->
                        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                            <button
                                id="btn-news"
                                class="pill"
                                onclick="triggerWorkflow('news')"
                                style="background: var(--accent-blue); border: none; font-weight: 600; padding: 10px 20px; cursor: pointer;">
                                🔍 Search News
                            </button>
                            <span id="status-news" style="font-size: 0.75rem; min-height: 1em;"></span>
                        </div>

                        <!-- Search Known Companies -->
                        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                            <button
                                id="btn-companies"
                                class="pill"
                                onclick="triggerWorkflow('companies')"
                                style="background: var(--accent-blue); border: none; font-weight: 600; padding: 10px 20px; cursor: pointer;">
                                🏢 Search Known Companies
                            </button>
                            <span id="status-companies" style="font-size: 0.75rem; min-height: 1em;"></span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Stats Bar -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Signals Processed (24h)</div>
                    <div class="stat-value">1,284</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">High Intent Leads</div>
                    <div class="stat-value" style="color: var(--success);">42</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">AI Accuracy</div>
                    <div class="stat-value">98.4%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Est. Pipeline Value</div>
                    <div class="stat-value">$14.2M</div>
                </div>
            </section>

            <!-- Leads Grid -->
            <section class="leads-section">
                <div class="section-title">
                    <span>Recent Discoveries</span>
                    <div style="display: flex; gap: 8px;">
                        <span class="pill">Filter: All Scores</span>
                        <span class="pill">Sort: Newest</span>
                    </div>
                </div>
                <div class="leads-grid" id="leadsContainer">
                    <!-- Leads injected by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <i data-lucide="x" class="close-btn" id="closeModal"></i>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
