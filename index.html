<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadIntel Pro | Enterprise AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">L</div>
                <span>LeadIntel Pro</span>
            </div>
            <nav class="nav-links">
                <div class="nav-item active">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </div>
                <div class="nav-item">
                    <i data-lucide="users"></i>
                    All Leads
                </div>
                <div class="nav-item">
                    <i data-lucide="trending-up"></i>
                    Analytics
                </div>
                <div class="nav-item">
                    <i data-lucide="settings"></i>
                    Integrations
                </div>
            </nav>
            <div class="nav-item" style="margin-top: auto;">
                <i data-lucide="log-out"></i>
                Sign Out
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Intelligence Dashboard</h1>
                    <p style="color: var(--text-secondary); margin-top: 4px;">Real-time growth signals for ERP Experts
                    </p>
                </div>
                <div class="header-actions">
                    <button class="pill"
                        style="background: var(--accent-blue); border: none; font-weight: 600; padding: 10px 20px;">
                        Refresh Signals
                    </button>
                </div>
            </header>

            <!-- Stats Bar -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Signals Processed (24h)</div>
                    <div class="stat-value">1,284</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">High Intent Leads</div>
                    <div class="stat-value" style="color: var(--success);">42</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">AI Accuracy</div>
                    <div class="stat-value">98.4%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Est. Pipeline Value</div>
                    <div class="stat-value">$14.2M</div>
                </div>
            </section>

            <!-- Leads Grid -->
            <section class="leads-section">
                <div class="section-title">
                    <span>Recent Discoveries</span>
                    <div style="display: flex; gap: 8px;">
                        <span class="pill">Filter: All Scores</span>
                        <span class="pill">Sort: Newest</span>
                    </div>
                </div>
                <div class="leads-grid" id="leadsContainer">
                    <!-- Leads will be injected here via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <i data-lucide="x" class="close-btn" id="closeModal"></i>
            <div id="modalBody">
                <!-- Modal content will be injected here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
